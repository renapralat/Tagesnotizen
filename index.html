<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📔 Tagesnotizen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 1rem;
            color: #fff;
        }

        .container { max-width: 700px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .title { font-size: 2rem; margin-bottom: 0.25rem; }

        .conn-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.75rem; padding: 0.2rem 0.55rem;
            border-radius: 9999px; background: #334155; color: #94a3b8;
        }
        .conn-badge.ok  { color: #34d399; }
        .conn-badge.err { color: #f87171; }
        .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

        .section {
            background: #1e293b; border: 1px solid #475569;
            border-radius: 0.5rem; padding: 0.65rem 0.75rem; margin-bottom: 0.75rem;
        }

        input[type="text"], input[type="password"], input[type="date"],
        textarea, select {
            width: 100%; background: #334155; color: #fff;
            border: 1px solid #475569; border-radius: 0.375rem;
            padding: 0.35rem 0.5rem; font-family: inherit;
            font-size: 0.875rem; margin-bottom: 0.5rem; display: block;
        }
        input:focus, textarea:focus, select:focus {
            outline: none; border-color: #3b82f6;
        }
        input[type="date"] { color-scheme: dark; }
        textarea { height: 230px; resize: vertical; line-height: 1.55; font-size: 0.85rem; padding: 0.5rem 0.75rem; margin-bottom: 0; }
        select option { background: #334155; }

        button {
            border: none; border-radius: 0.375rem; color: #fff;
            font-weight: 600; cursor: pointer; font-size: 0.8rem;
            transition: opacity 0.15s; padding: 0.25rem 0.55rem;
        }
        button:hover:not(:disabled) { opacity: 0.85; }
        button:disabled { opacity: 0.45; cursor: not-allowed; }

        .btn-green  { background: #10b981; }
        .btn-purple { background: #8b5cf6; }
        .btn-amber  { background: #f59e0b; }
        .btn-red    { background: #ef4444; }
        .btn-blue   { background: #3b82f6; }
        .btn-gray   { background: #64748b; }
        .btn-dark   { background: #475569; }
        .btn-full   { width: 100%; display: block; margin-bottom: 0.5rem; }
        .btn-icon   { padding: 0.4rem 0.65rem; font-size: 1rem; flex: none; min-width: auto; }

        .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .btn-row > button { flex: 1; min-width: 0; }

        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
            gap: 0.5rem; margin-bottom: 0.75rem;
        }
        .tag-btn {
            padding: 0.2rem 0.35rem; background: #475569;
            font-size: 0.8rem; font-weight: 500; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tag-btn.active { background: #2563eb; }
        .tag-btn:hover:not(.active) { background: #64748b; }
        .cat-actions {
            display: flex; gap: 0.5rem;
            padding-top: 0.75rem; border-top: 1px solid #334155;
        }
        .cat-actions button { flex: 1; padding: 0.2rem 0.4rem; font-size: 0.8rem; }

        .date-row { display: flex; align-items: center; gap: 0.75rem; }
        .date-row span { font-size: 1.4rem; flex: none; }
        .date-row input { flex: 1; margin-bottom: 0; }

        /* Eingabe + Mikrofon-Buttons nebeneinander */
        .input-area { display: flex; gap: 0.5rem; align-items: flex-start; margin-bottom: 0.5rem; }
        .input-area textarea { flex: 1; min-width: 0; margin-bottom: 0; }
        .input-side { display: flex; flex-direction: column; gap: 0.4rem; flex: none; align-items: stretch; width: 2.8rem; }
        .side-btn { width: 100%; padding: 0.45rem 0.2rem; font-size: 1rem; text-align: center; flex: none; }
        .mic-btn { font-size: 1.1rem; padding: 0.45rem 0.6rem; }
        .mic-btn.recording { background: #dc2626; animation: pulse 0.9s ease-in-out infinite; }
        #inputText[readonly] { border-color: #f59e0b; cursor: not-allowed; }
        .speak-btn.speaking { background: #dc2626; animation: pulse 0.9s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; }
        .rec-dot.active { background: #f87171; animation: pulse 0.9s ease-in-out infinite; }

        .buffer-box {
            background: #334155; border: 1px solid #475569;
            border-radius: 0.375rem; padding: 0.75rem; margin-bottom: 0.75rem;
        }
        .buffer-label {
            font-size: 0.75rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.5rem;
        }
        .buffer-item {
            display: flex; align-items: flex-start; gap: 0.4rem;
            margin-bottom: 0.35rem; padding: 0.4rem 0.5rem;
            background: #1e293b; border-radius: 0.3rem;
        }
        .buffer-num { font-size: 0.75rem; color: #64748b; flex: none; padding-top: 0.15rem; font-weight: 700; }
        .buffer-text { flex: 1; font-size: 0.9rem; line-height: 1.55; word-break: break-word; }
        .buffer-del, .buffer-edit {
            background: none; padding: 0 0.2rem;
            font-size: 0.9rem; flex: none; min-width: auto;
        }
        .buffer-del { color: #475569; }
        .buffer-del:hover { color: #ef4444; background: none; opacity: 1; }
        .buffer-edit { color: #475569; }
        .buffer-edit:hover { color: #3b82f6; background: none; opacity: 1; }

        .summary-box {
            background: #334155; border: 1px solid #3b82f6;
            border-radius: 0.375rem; padding: 1rem; margin-bottom: 0.5rem;
            line-height: 1.75; height: 320px; resize: vertical;
            white-space: pre-wrap; word-break: break-word;
            font-family: inherit; font-size: 0.95rem; color: #fff;
        }

        /* Globale Suche */
        .global-results-box {
            margin-top: 0.75rem; border-top: 1px solid #334155; padding-top: 0.75rem;
        }
        .global-results-title {
            font-size: 0.8rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .global-result {
            background: #334155; border: 1px solid #475569;
            border-radius: 0.375rem; padding: 0.65rem 0.75rem; margin-bottom: 0.45rem;
        }
        .global-result-meta {
            display: flex; gap: 0.45rem; align-items: center; margin-bottom: 0.3rem; flex-wrap: wrap;
        }
        .global-result-cat {
            background: #2563eb; color: #fff; padding: 0.1rem 0.45rem;
            border-radius: 9999px; font-weight: 700; font-size: 0.75rem;
        }
        .global-result-date { color: #94a3b8; font-size: 0.78rem; }
        .global-result-snippet { font-size: 0.88rem; line-height: 1.6; color: #e2e8f0; }
        .global-result-snippet mark {
            background: #f59e0b; color: #000; border-radius: 2px; padding: 0 2px; font-weight: 600;
        }

        /* Kompakte Export-Zeilen */
        .export-line {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.45rem 0; border-top: 1px solid #334155;
        }
        .exp-icon {
            font-size: 0.75rem; color: #94a3b8; flex: none;
            white-space: nowrap; font-weight: 700; min-width: 2.5rem;
        }
        .export-line input[type="date"] {
            flex: 1; min-width: 0; margin-bottom: 0;
            font-size: 0.78rem; padding: 0.3rem 0.25rem;
        }
        .export-line select {
            flex: 2; min-width: 0; margin-bottom: 0;
            font-size: 0.78rem; padding: 0.3rem 0.25rem;
        }
        .export-line button { flex: none; padding: 0.3rem 0.55rem; font-size: 0.9rem; }
        .exp-cat-chip {
            padding: 0.2rem 0.55rem; border-radius: 9999px; font-size: 0.78rem;
            font-weight: 600; background: #475569; color: #fff; cursor: pointer;
            border: none; transition: background 0.15s;
        }
        .exp-cat-chip.active { background: #2563eb; }
        .export-cat-item {
            display: flex; align-items: center; gap: 0.9rem;
            padding: 0.85rem 1rem; font-size: 1rem; color: #f1f5f9;
            cursor: pointer; border-bottom: 1px solid #2d3f55; user-select: none;
        }
        .export-cat-item:active { background: #2d3f55; }
        .export-cat-dot { font-size: 1.2rem; color: #3b82f6; width: 1.4rem; text-align: center; }

        .section-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 1rem; color: #e2e8f0; }

        .entry {
            background: #334155; border: 1px solid #475569;
            border-radius: 0.4rem; padding: 0.9rem; margin-bottom: 0.65rem;
        }
        .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .entry-date { color: #94a3b8; font-size: 0.875rem; font-weight: 700; }
        .entry-actions { display: flex; gap: 0.4rem; }
        .entry-text { line-height: 1.65; white-space: pre-wrap; word-break: break-word; font-size: 0.95rem; }

        /* KI Section */
        .ki-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.75rem;
        }
        .ki-title { font-size: 1rem; font-weight: 700; color: #e2e8f0; }
        .ki-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #475569; flex: none;
        }
        .ki-dot.active { background: #10b981; }
        .ki-status { font-size: 0.875rem; margin-bottom: 0.75rem; }
        .ki-status.ok  { color: #34d399; }
        .ki-status.err { color: #f87171; }

        /* Modal */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); z-index: 1000;
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b; padding: 1.5rem; border-radius: 0.5rem;
            width: 100%; max-width: 420px; border: 1px solid #475569;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .modal-title { font-size: 1.15rem; font-weight: 700; }
        .modal-close {
            background: none; border: none; color: #94a3b8;
            font-size: 1.4rem; cursor: pointer; padding: 0.1rem 0.3rem;
            line-height: 1; flex: none; min-width: auto;
        }
        .modal-close:hover { color: #fff; background: none; }

        .form-label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.4rem; color: #cbd5e1; }

        .empty-msg { color: #475569; text-align: center; padding: 1.25rem; font-size: 0.9rem; }
        .hidden { display: none !important; }
        .tip {
            font-size: 0.8rem; color: #94a3b8; padding: 0.5rem 0.75rem;
            background: #334155; border-radius: 0.375rem;
            border-left: 3px solid #3b82f6; margin-top: 0.75rem;
        }

        /* Toast */
        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(4rem);
            background: #10b981; color: #fff; font-weight: 600; font-size: 0.95rem;
            padding: 0.65rem 1.4rem; border-radius: 2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0; z-index: 9999; pointer-events: none; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.err  { background: #ef4444; }
    </style>
</head>
<body>
<div id="toast"></div>
<div class="container">

    <!-- NEW CATEGORY MODAL -->
    <div id="newCatModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">+ Neue Kategorie</span>
                <button class="modal-close" onclick="closeNewCatModal()">✕</button>
            </div>
            <label class="form-label">Name:</label>
            <input type="text" id="newCatInput" placeholder="Kategorie-Name…"
                   onkeydown="if(event.key==='Enter')addCategory()">
            <div class="btn-row" style="margin-top:0;">
                <button class="btn-gray" onclick="closeNewCatModal()">Abbrechen</button>
                <button class="btn-green" onclick="addCategory()">+ Hinzufügen</button>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <h1 class="title">📔 Tagesnotizen</h1>
        <span id="connBadge" class="conn-badge">
            <span class="conn-dot"></span>&nbsp;Verbinde…
        </span>
    </div>

    <!-- SEARCH -->
    <div class="section">
        <div style="display:flex;gap:0.4rem;align-items:center;">
            <input type="text" id="searchInput" placeholder="🔍 Suchen…  Genau: Ei · *Endung · Anfang* · *überall*"
                   oninput="filterEntries()" style="margin-bottom:0;flex:1;">
            <button id="searchMicBtn" class="btn-icon btn-amber"
                    onclick="toggleSearchMic()" title="Sprachsuche">🎤</button>
            <button class="btn-icon btn-blue" onclick="globalSearch()" title="Alle Kategorien durchsuchen">🌐</button>
            <button class="btn-icon btn-gray" onclick="clearSearch()" title="Suche löschen">✕</button>
        </div>
        <div id="globalResultsBox" class="global-results-box hidden"></div>
    </div>

    <!-- EXPORT + DATE + CATEGORIES -->
    <div class="section">
        <!-- Zeile 1: Von–Bis -->
        <div style="display:flex;gap:0.35rem;align-items:center;margin-bottom:0.35rem;">
            <span class="exp-icon" style="min-width:1.5rem;">📅</span>
            <input type="date" id="exportFrom" style="flex:1;margin-bottom:0;font-size:0.78rem;padding:0.3rem 0.25rem;">
            <input type="date" id="exportTo"   style="flex:1;margin-bottom:0;font-size:0.78rem;padding:0.3rem 0.25rem;">
            <button class="btn-dark btn-icon" onclick="exportRange()" title="Zeitraum herunterladen">📥</button>
            <button class="btn-red  btn-icon" onclick="deleteRange()"  title="Zeitraum löschen">🗑️</button>
        </div>
        <!-- Zeile 2: +/- Kategorie | Kategorie-Auswahl | Tag-Export -->
        <div style="display:flex;gap:0.35rem;align-items:center;margin-bottom:0.5rem;">
            <button class="btn-icon btn-dark" onclick="openNewCatModal()" title="Neue Kategorie" style="font-size:0.85rem;">+🏷️</button>
            <button class="btn-icon btn-dark" onclick="deleteSelectedCategory()" title="Kategorie löschen" style="font-size:0.85rem;">−🏷️</button>
            <div style="position:relative;flex:1;">
                <button id="exportCatBtn" onclick="toggleExportCatDropdown()"
                        style="width:100%;display:flex;justify-content:space-between;align-items:center;font-size:0.78rem;padding:0.3rem 0.5rem;background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:0.5rem;cursor:pointer;">
                    <span id="exportCatBtnLabel">Alle Kategorien</span><span>▼</span>
                </button>
                <div id="exportCatDropdown" class="hidden"
                     style="position:absolute;top:calc(100% + 4px);left:0;min-width:100%;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.6);overflow:hidden;">
                </div>
            </div>
            <span class="exp-icon" style="white-space:nowrap;">📥 Tag</span>
            <input type="date" id="exportDayDate" style="flex:1;margin-bottom:0;font-size:0.78rem;padding:0.3rem 0.25rem;">
            <button class="btn-dark btn-icon" onclick="exportDay()" title="Tag herunterladen">📥</button>
            <button class="btn-red  btn-icon" onclick="deleteDay()"  title="Tag löschen">🗑️</button>
        </div>
        <!-- Eintragsdatum -->
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
            <span>📅</span>
            <input type="date" id="entryDate" onchange="onDateChange()" style="flex:1;margin-bottom:0;">
        </div>
        <!-- Kategorie-Chips (Aufnahme + Export) -->
        <div id="categoryGrid" class="tag-grid"></div>
    </div>

    <!-- INPUT -->
    <div id="inputSection" class="section hidden">
        <div class="input-area">
            <textarea id="inputText" placeholder="Sprechen oder schreiben…"></textarea>
            <div class="input-side">
                <button id="micBtn" class="btn-amber mic-btn side-btn" onclick="toggleMic()" title="Aufnahme starten / stoppen">🎤</button>
                <span id="recDot" class="rec-dot" style="align-self:center;"></span>
                <button id="headingsToggle" onclick="toggleHeadings()" class="btn-dark side-btn" title="Überschriften / Fließtext" style="font-size:0.8rem;">ÜE</button>
                <button class="btn-green side-btn" onclick="addToBuffer()" title="Zwischenspeichern" style="font-size:1.3rem;">+</button>
                <button class="btn-gray side-btn" onclick="clearInput()" title="Text löschen" style="font-size:1.1rem;">−</button>
                <button class="btn-purple side-btn" id="summarizeBtn" onclick="summarizeText()" title="Zusammenfassen" style="font-size:1.2rem;">🪄</button>
            </div>
        </div>
        <div id="bufferContainer" class="buffer-box hidden">
            <div class="buffer-label">📝 Zwischengespeichert</div>
            <div id="bufferList"></div>
        </div>
    </div>

    <!-- SUMMARY -->
    <div id="summarySection" class="section hidden">
        <div class="input-area" style="align-items:stretch;">
            <textarea id="summaryText" class="summary-box" style="margin-bottom:0; flex:1;"></textarea>
            <div class="input-side">
                <button id="speakSummaryBtn" class="btn-amber side-btn speak-btn" onclick="speakSummary()" title="Alles vorlesen">🔊</button>
                <button class="btn-green side-btn" onclick="speakFromCursor()" title="Von Cursor-Position vorlesen">▶</button>
                <button class="btn-purple side-btn" onclick="saveSummary()" title="Speichern">💾</button>
                <button class="btn-gray side-btn" onclick="backToInput()" title="Zurück">↩</button>
            </div>
        </div>
    </div>

    <!-- ENTRIES -->
    <div class="section">
        <div class="section-title">
            Einträge:&nbsp;<span id="currentTagDisplay" style="color:#94a3b8;">—</span>
        </div>
        <div id="entriesContainer">
            <p class="empty-msg">Bitte Datum und Kategorie wählen.</p>
        </div>
    </div>

    <!-- KI-ANALYSE -->
    <div class="section">
        <div class="ki-header">
            <span class="ki-title">🤖 KI-ANALYSE</span>
            <div style="display:flex;align-items:center;gap:0.5rem;">
                <span id="kiDot" class="ki-dot"></span>
                <button class="btn-dark" style="font-size:0.75rem;padding:0.2rem 0.55rem;" onclick="toggleTokenPanel()">Token verwalten</button>
            </div>
        </div>
        <p id="kiStatus" class="ki-status"></p>
        <div id="tokenPanel" class="hidden">
            <input type="password" id="githubPatInput" placeholder="github_pat_…" style="margin-bottom:0.5rem;">
            <div class="btn-row">
                <button class="btn-gray" onclick="clearGithubPat()">Löschen</button>
                <button class="btn-blue" onclick="saveGithubPat()">Speichern</button>
            </div>
            <div class="tip">
                GitHub → Einstellungen → Developer settings → Personal access tokens (Classic) → Generate.<br>
                Keine Berechtigungen nötig. Nur lokal gespeichert.<br>
                Modell: <strong>gpt-4o</strong>
            </div>
        </div>
    </div>

</div>

<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://bxwamphvycjfeexjzgyv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4d2FtcGh2eWNqZmVleGp6Z3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjI1NjQsImV4cCI6MjA5MzM5ODU2NH0.LMEz3yuh8GmIZ6PfkTxer1yrAYpspNJOBPKTIV7T3qQ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// GitHub Models API
const GH_MODELS_URL = 'https://models.inference.ai.azure.com/chat/completions';
const GH_MODEL      = 'gpt-4o';

// ── State ─────────────────────────────────────────────────────────────────────
let selectedDate     = getTodayDate();
let selectedCategory = null;
let categories       = [];
let entries          = [];
let buffer           = [];
let bufferByCategory = {};
let currentSummary   = '';
let currentSummaryDate = '';
let savedInputText   = '';
let isRecording      = false;
let recognition      = null;
let micBefore = '';  // text before cursor position when mic started
let micAfter  = '';  // text after cursor position when mic started
let micDone   = '';  // text dictated since last mic start (across session restarts)
let micReset  = false; // when true, onresult skips commit, onend skips restart
let speakingId       = null;  // null | 'summary' | entry-uuid
let speakResumeTimer = null;  // workaround for Android auto-pause bug

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('entryDate').value     = selectedDate;
    document.getElementById('exportDayDate').value = selectedDate;
    // Aktuellen Monat vorbelegen
    const now = new Date();
    const y = now.getFullYear(), m = pad(now.getMonth() + 1);
    const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    document.getElementById('exportFrom').value = `${y}-${m}-01`;
    document.getElementById('exportTo').value   = `${y}-${m}-${pad(lastDay)}`;
    loadKiPat();
    await loadCategories();
    document.addEventListener('click', e => {
        const btn = document.getElementById('exportCatBtn');
        const dd  = document.getElementById('exportCatDropdown');
        if (dd && !dd.classList.contains('hidden') && btn && !btn.contains(e.target) && !dd.contains(e.target))
            closeExportCatDropdown();
    });
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function getTodayDate() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// ── Voice (Mikrofon – bleibt dauerhaft an) ────────────────────────────────────
function toggleMic() {
    if (isRecording) {
        stopMic();
    } else {
        const ta  = document.getElementById('inputText');
        const pos = ta.selectionStart;          // Cursorposition auslesen
        micBefore = ta.value.substring(0, pos); // Text vor dem Cursor
        micAfter  = ta.value.substring(pos);    // Text nach dem Cursor
        micDone   = '';
        startMic();
    }
}

function startMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        alert('Spracherkennung nicht verfügbar.\nBitte Chrome verwenden.');
        return;
    }
    // continuous=false: Chrome liefert pro Session genau EINE Äußerung.
    // Das verhindert den Chrome-Bug, bei dem bereits finalisierte Ergebnisse
    // mit ev.resultIndex=0 erneut geliefert werden → keine Textverdopplung.

    micReset = false;
    recognition = new SR();
    recognition.lang = 'de-DE';
    recognition.continuous = false;
    recognition.interimResults = true;

    const ta = document.getElementById('inputText');
    let curInterim = '';

    recognition.onstart = () => {
        document.getElementById('micBtn').classList.add('recording');
        ta.readOnly = true;   // kein händisches Editieren während Aufnahme
        setRecStatus(true);
    };

    recognition.onresult = (ev) => {
        if (micReset) return;
        let final = '', interim = '';
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
            if (ev.results[i].isFinal) final += ev.results[i][0].transcript;
            else                       interim += ev.results[i][0].transcript;
        }
        if (final.trim()) {
            micDone += (micDone || micBefore ? ' ' : '') + final.trim();
            curInterim = '';
        } else {
            curInterim = interim;
        }
        const sep = (micDone || micBefore) && curInterim ? ' ' : '';
        ta.value = micBefore + micDone + sep + curInterim + micAfter;
        if (curInterim) setRecStatus(true);
    };

    recognition.onend = () => {
        curInterim = '';
        ta.value = micBefore + micDone + micAfter;
        micReset = false;
        if (isRecording) {
            setTimeout(() => { if (isRecording) startMic(); }, 80);
        } else {
            ta.readOnly = false;
            document.getElementById('micBtn').classList.remove('recording');
            setRecStatus(false);
        }
    };

    recognition.onerror = (ev) => {
        if (ev.error === 'not-allowed') {
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            setRecStatus(false);
            alert('Mikrofon-Zugriff verweigert.\nBitte in den Browser-Einstellungen erlauben.');
        }
    };

    isRecording = true;
    try { recognition.start(); }
    catch(e) { isRecording = false; setRecStatus(false); }
}

function stopMic() {
    isRecording = false;
    try { recognition && recognition.stop(); } catch(e){}
    document.getElementById('inputText').readOnly = false;
    document.getElementById('micBtn').classList.remove('recording');
    setRecStatus(false);
}

function setRecStatus(active) {
    const dot = document.getElementById('recDot');
    if (dot) dot.className = 'rec-dot' + (active ? ' active' : '');
}

}

function getGithubPat() { return localStorage.getItem('tagesnotizen-github-pat') || ''; }

async function callGithubModels(prompt, systemPrompt) {
    const pat = getGithubPat();
    if (!pat) throw new Error('Kein GitHub Token gesetzt. Bitte unten eingeben.');

    const messages = [];
    if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
    messages.push({ role: 'user', content: prompt });

    const res = await fetch(GH_MODELS_URL, {
        method: 'POST',
        headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + pat
        },
        body: JSON.stringify({
            model:      GH_MODEL,
            max_tokens: 1500,
            messages
        })
    });

    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || 'GitHub Models Fehler ' + res.status);
    }
    const data = await res.json();
    return (data.choices?.[0]?.message?.content || '').trim();
}

// ── AI Summarization ──────────────────────────────────────────────────────────
function collectText() {
    const cur = document.getElementById('inputText').value.trim();
    const all = [...buffer];

    return all.join('\n\n');
}

    btn.title = summaryWithHeadings ? 'Überschriften aktiv – klicken für Fließtext' : 'Fließtext aktiv – klicken für Überschriften';
}

async function summarizeText() {
    // Datum immer frisch aus dem Eingabefeld lesen, falls es nach editEntry() geändert wurde
    selectedDate = document.getElementById('entryDate').value;

    const allText = collectText();
    if (!allText) { alert('Bitte Text eingeben oder diktieren.'); return; }

    if (!getGithubPat()) {
        alert('Bitte zuerst den GitHub Token im Abschnitt "KI-ANALYSE" unten eingeben.');
        document.getElementById('kiSection') &&
            document.getElementById('kiSection').scrollIntoView({ behavior: 'smooth' });
        return;
    }

    const btn = document.getElementById('summarizeBtn');
    btn.disabled = true;
    btn.textContent = '⏳';

    try {
        const { data: existing } = await sb.from('tagesnotizen_entries')
            .select('text').eq('datum', selectedDate).eq('category', selectedCategory)
            .maybeSingle();

        const structure = summaryWithHeadings
            ? 'Gliedere den fertigen Text in kurze thematische Absaetze (z.B. Morgen, Einkauf, Mittag, Besuch). Jeder Absatz hat eine fette Ueberschrift. '
            : 'Schreibe einen zusammenhaengenden Fliesstext ohne Ueberschriften und ohne fette Hervorhebungen. Trenne verschiedene Gedanken durch Leerzeilen. ';
        const sysPrompt = 'Du bist ein persoenlicher Tagebuch-Assistent. ' +
            'Die schreibende Person verwendet "ich" fuer sich selbst. ' +
            '"ich" ist NIEMALS ein Name und wird NIEMALS durch einen Namen ersetzt. ' +
            'Alle Namen im Text (z.B. Norbert, Marina, Kathy) sind andere Personen, niemals die schreibende Person selbst. ' +
            'Norbert ist der Ehemann der schreibenden Person. ' +
            'Behalte jede Personenrolle exakt: Wer im Original handelt, handelt auch in der Zusammenfassung. ' +
            'Beispiel: "Ich habe Norbert abgeholt" = ICH habe gehandelt, Norbert wurde abgeholt — niemals umgekehrt. ' +
            'Behalte "wir" wenn beide zusammen handelten. Veraendere die Perspektive niemals. ' +
            'Behalte alle Namen, Orte und konkreten Details unveraendert. ' +
            structure +
            'Antworte nur mit dem fertigen Text, ohne Einleitung.';
        let prompt;
        if (existing && existing.text.trim()) {
            prompt = 'Fasse diese zwei Tagebucheintraege desselben Tages zu einem zusammen. ' +
                'Erkenne wiederkehrende Begriffe, Namen und Themen. Behalte zeitliche Reihenfolgen. ' +
                'Gliedere nach Themen.\n\n' +
                'Neuer Eintrag:\n' + allText + '\n\nBisheriger Eintrag:\n' + existing.text;
        } else {
            prompt = 'Fasse diesen Tagebucheintrag praegnant zusammen. ' +
                'Erkenne wiederkehrende Begriffe und fasse dazu gehoerige Gedanken zusammen. ' +
                'Behalte erkennbare zeitliche Reihenfolgen. Gliedere nach Themen.\n\nText:\n' + allText;
        }

        currentSummary     = await callGithubModels(prompt, sysPrompt);
        currentSummaryDate = selectedDate;
        savedInputText     = document.getElementById('inputText').value;

        document.getElementById('summaryText').value = currentSummary;
        document.getElementById('summarySection').classList.remove('hidden');
        document.getElementById('summarySection').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (e) {
        alert('Fehler:\n' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🪄';
    }
}

function backToInput() {
    document.getElementById('summarySection').classList.add('hidden');

    const parts = [];
    if (savedInputText.trim()) parts.push(savedInputText.trim());
    buffer.forEach(item => { if (item.trim()) parts.push(item.trim()); });
    const merged = parts.join('\n\n');

    currentSummary = '';

// ── TTS (Vorlesen) ────────────────────────────────────────────────────────────
function stopSpeaking() {
    if (speakResumeTimer) { clearInterval(speakResumeTimer); speakResumeTimer = null; }
    window.speechSynthesis.cancel();
    speakingId = null;
    updateSpeakUI();
}

function updateSpeakUI() {
    document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('speaking'));
    if (!speakingId) return;
    const btn = speakingId === 'summary'
        ? document.getElementById('speakSummaryBtn')
        : document.getElementById('speak-' + speakingId);
    if (btn) btn.classList.add('speaking');
}

function stripMarkdown(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/^#{1,6}\s+/gm, '');
}

function startSpeaking(text, id) {
    const synth = window.speechSynthesis;
    const utt   = new SpeechSynthesisUtterance(stripMarkdown(text));
    utt.lang    = 'de-DE';
    utt.onend = utt.onerror = () => {
        if (speakResumeTimer) { clearInterval(speakResumeTimer); speakResumeTimer = null; }
        speakingId = null;
        updateSpeakUI();
    };
    speakingId = id;
    updateSpeakUI();
    synth.speak(utt);
    // Workaround: Android/Chrome pausiert TTS automatisch – alle 5 s fortsetzen
    speakResumeTimer = setInterval(() => {
        if (synth.paused && speakingId) synth.resume();
    }, 5000);
}

function speakEntry(id) {
    const prev = speakingId;
    stopSpeaking();
    if (prev !== null) return; // war aktiv → nur stoppen
    const e = entries.find(x => x.id === id);
    if (e) startSpeaking(e.text, id);
}

function speakSummary() {
    const prev = speakingId;
    stopSpeaking();
    if (prev !== null) return;
    const text = document.getElementById('summaryText').value || currentSummary;
    if (text) startSpeaking(text, 'summary');
}

function speakFromCursor() {
    const ta = document.getElementById('summaryText');
    const pos = ta.selectionStart;
    const text = ta.value.substring(pos).trim();
    if (!text) return;
    const prev = speakingId;
    stopSpeaking();
    if (prev !== null) return;
    startSpeaking(text, 'summary');
}

// ── Search ────────────────────────────────────────────────────────────────────
function filterEntries() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) { displayEntries(entries); return; }
    displayEntries(entries.filter(e =>
        e.text.toLowerCase().includes(q) || e.datum.includes(q)
    ));
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('globalResultsBox').classList.add('hidden');
    document.getElementById('globalResultsBox').innerHTML = '';
    displayEntries(entries);
}

function extractSnippet(text, re) {
    re.lastIndex = 0;
    const m = re.exec(text);
    if (!m) return '';
    const idx = m.index;
    let start = text.lastIndexOf('\n', idx);
    start = start === -1 ? 0 : start + 1;
    let end = text.indexOf('\n', idx + m[0].length);
    if (end === -1) end = text.length;
    let snippet = text.substring(start, end).trim();
    if (snippet.length > 200) {
        const local = Math.max(0, idx - start - 80);
        snippet = (local > 0 ? '…' : '') + snippet.substring(local, local + 180) + '…';
    }
    re.lastIndex = 0;
    return snippet.replace(re, hit => `<mark>${hit}</mark>`);
}

async function globalSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) { showToast('Bitte Suchbegriff eingeben.', true); return; }
    const hasLeading  = q.startsWith('*');
    const hasTrailing = q.endsWith('*');
    const term = q.replace(/^\*|\*$/g, '');
    if (!term) { showToast('Bitte Suchbegriff eingeben.', true); return; }
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const pat = `${hasLeading ? '' : '\\b'}${escaped}${hasTrailing ? '' : '\\b'}`;
    const makeRe = () => new RegExp(pat, 'gi');

    const box = document.getElementById('globalResultsBox');
    box.classList.remove('hidden');
    box.innerHTML = '<div class="global-results-title">Suche läuft…</div>';
    try {
        const { data, error } = await sb.from('tagesnotizen_entries')
            .select('datum, category, text')
            .ilike('text', `%${term}%`)
            .order('datum', { ascending: false });
        if (error) throw error;
        const matches = (data || []).filter(row => makeRe().test(row.text));
        if (matches.length === 0) {
            box.innerHTML = `<div class="global-results-title">Keine Ergebnisse für „${q}"
                <button class="btn-gray btn-icon" style="font-size:0.8rem;padding:0.15rem 0.4rem;" onclick="clearSearch()">✕</button>
            </div>`;
            return;
        }
        let html = `<div class="global-results-title">
            ${matches.length} Treffer für „${q}"
            <button class="btn-gray btn-icon" style="font-size:0.8rem;padding:0.15rem 0.4rem;" onclick="clearSearch()">✕</button>
        </div>`;
        for (const row of matches) {
            html += `<div class="global-result">
                <div class="global-result-meta">
                    <span class="global-result-cat">${row.category}</span>
                    <span class="global-result-date">${row.datum}</span>
                </div>
                <div class="global-result-snippet">${extractSnippet(row.text, makeRe())}</div>
            </div>`;
        }
        box.innerHTML = html;
        box.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) { showToast('Fehler: ' + e.message, true); }
}

// ── Suche per Mikrofon ────────────────────────────────────────────────────────
let searchRecognition = null;
let isSearchRecording = false;

function toggleSearchMic() { isSearchRecording ? stopSearchMic() : startSearchMic(); }

function startSearchMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Spracherkennung nicht verfügbar.'); return; }
    if (searchRecognition) { try { searchRecognition.abort(); } catch(e){} }

    searchRecognition = new SR();
    searchRecognition.lang = 'de-DE';
    searchRecognition.continuous = false;
    searchRecognition.interimResults = false;

    searchRecognition.onresult = (ev) => {
        document.getElementById('searchInput').value = ev.results[0][0].transcript;
        filterEntries();
    };
    searchRecognition.onend = () => {
        isSearchRecording = false;
        document.getElementById('searchMicBtn').classList.remove('recording');
        const q = document.getElementById('searchInput').value.trim();
        if (q) globalSearch();
    };
    searchRecognition.onerror = () => {
        isSearchRecording = false;
        document.getElementById('searchMicBtn').classList.remove('recording');
    };

    isSearchRecording = true;
    document.getElementById('searchMicBtn').classList.add('recording');
    try { searchRecognition.start(); } catch(e) {
        isSearchRecording = false;
        document.getElementById('searchMicBtn').classList.remove('recording');
    }
}

function stopSearchMic() {
    isSearchRecording = false;
    try { searchRecognition && searchRecognition.stop(); } catch(e){}
    document.getElementById('searchMicBtn').classList.remove('recording');
}

// ── Export Kategorie-Dropdown ─────────────────────────────────────────────────
let selectedExportCats = new Set();   // leer = alle

function updateExportSelect() {
    // Entfernte Kategorien aus Auswahl löschen, Label aktualisieren
    [...selectedExportCats].forEach(c => { if (!categories.includes(c)) selectedExportCats.delete(c); });
    refreshExportCatLabel();
}

function refreshExportCatLabel() {
    const btn = document.getElementById('exportCatBtnLabel');
    if (!btn) return;
    const n = selectedExportCats.size;
    btn.textContent = n === 0 ? 'Alle Kategorien' : n === 1 ? [...selectedExportCats][0] : `${n} gewählt`;
}

function toggleExportCatDropdown() {
    const dd = document.getElementById('exportCatDropdown');
    const isOpen = !dd.classList.contains('hidden');
    if (isOpen) { dd.classList.add('hidden'); return; }
    renderExportCatDropdown();
    dd.classList.remove('hidden');
}

function renderExportCatDropdown() {
    const dd = document.getElementById('exportCatDropdown');
    dd.innerHTML = categories.map(c =>
        `<div class="export-cat-item" onclick="toggleExportCatItem('${c}')">
            <span class="export-cat-dot">${selectedExportCats.has(c) ? '●' : '○'}</span>
            <span>${c}</span>
        </div>`
    ).join('') +
    `<div style="padding:0.5rem;border-top:1px solid #334155;">
        <button onclick="closeExportCatDropdown()"
                style="width:100%;padding:0.65rem;font-size:0.95rem;background:#2563eb;color:#fff;border:none;border-radius:0.4rem;cursor:pointer;font-weight:600;">
            ✓ Fertig
        </button>
     </div>`;
}

function toggleExportCatItem(cat) {
    if (selectedExportCats.has(cat)) selectedExportCats.delete(cat);
    else selectedExportCats.add(cat);
    renderExportCatDropdown();
    refreshExportCatLabel();
}

function closeExportCatDropdown() {
    document.getElementById('exportCatDropdown').classList.add('hidden');
}

function exportCatFilter(q) {
    if (selectedExportCats.size === 0) return q;
    const cats = [...selectedExportCats];
    return cats.length === 1 ? q.eq('category', cats[0]) : q.in('category', cats);
}
function exportCatLabel() {
    if (selectedExportCats.size === 0) return 'Alle';
    return [...selectedExportCats].join('+');
}

async function exportDay() {
    const datum = document.getElementById('exportDayDate').value;
    if (!datum) { showToast('Bitte Datum auswählen.', true); return; }
    try {
        let q = sb.from('tagesnotizen_entries').select('*').eq('datum', datum);
        q = exportCatFilter(q);
        const { data, error } = await q.order('category');
        if (error) throw error;
        if (!data || data.length === 0) { showToast('Keine Einträge für diesen Tag.', true); return; }
        const label = exportCatLabel();
        downloadExport(buildTxt(`${label} · ${datum}`, data), `tagesnotizen-${label}-${datum}.txt`);
    } catch (e) { showToast('Fehler: ' + e.message, true); }
}

async function deleteDay() {
    const datum = document.getElementById('exportDayDate').value;
    if (!datum) { showToast('Bitte Datum auswählen.', true); return; }
    const ok = confirm(`Wirklich Einträge vom ${datum} (${exportCatLabel()}) löschen?`);
    if (!ok) return;
    try {
        let q = sb.from('tagesnotizen_entries').delete().eq('datum', datum);
        q = exportCatFilter(q);
        const { error } = await q;
        if (error) throw error;
        showToast('✅ Tag gelöscht.');
        await renderEntries();
    } catch (e) { showToast('Fehler: ' + e.message, true); }
}

async function exportRange() {
    const from = document.getElementById('exportFrom').value;
    const to   = document.getElementById('exportTo').value;
    if (!from || !to) { showToast('Bitte Von- und Bis-Datum auswählen.', true); return; }
    try {
        let q = sb.from('tagesnotizen_entries').select('*').gte('datum', from).lte('datum', to);
        q = exportCatFilter(q);
        const { data, error } = await q.order('datum').order('category');
        if (error) throw error;
        if (!data || data.length === 0) { showToast('Keine Einträge für diesen Zeitraum.', true); return; }
        const label = exportCatLabel();
        downloadExport(buildTxt(`${label} · ${from} – ${to}`, data), `tagesnotizen-${label}-${from}-${to}.txt`);
    } catch (e) { showToast('Fehler: ' + e.message, true); }
}

async function deleteRange() {
    const from = document.getElementById('exportFrom').value;
    const to   = document.getElementById('exportTo').value;
    if (!from || !to) { showToast('Bitte Von- und Bis-Datum auswählen.', true); return; }
    const ok = confirm(`Wirklich Einträge vom ${from} bis ${to} (${exportCatLabel()}) löschen?`);
    if (!ok) return;
    try {
        let q = sb.from('tagesnotizen_entries').delete().gte('datum', from).lte('datum', to);
        q = exportCatFilter(q);
        const { error } = await q;
        if (error) throw error;
        showToast('✅ Einträge gelöscht.');
        await renderEntries();
    } catch (e) { showToast('Fehler: ' + e.message, true); }
}

function buildTxt(title, rows) {
    const today = new Date().toLocaleDateString('de-DE',
        { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    let out = `Tagesnotizen – ${title}\nErstellt am ${today}\n${'='.repeat(55)}\n\n`;
    let lastDate = '';
    rows.forEach(r => {
        if (r.datum !== lastDate) {
            if (lastDate) out += '\n';
            const ds = new Date(r.datum + 'T12:00:00')
                .toLocaleDateString('de-DE', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
            out += ds + '\n' + '-'.repeat(55) + '\n\n';
            lastDate = r.datum;
        }
        if (rows.some(x => x.datum === r.datum && x.category !== r.category)) {
            out += '[' + r.category + ']\n\n';
        }
        out += r.text + '\n\n';
    });
    return out.trimEnd() + '\n';
}

function downloadExport(content, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['﻿' + content], { type: 'text/plain;charset=utf-8;' }));
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
